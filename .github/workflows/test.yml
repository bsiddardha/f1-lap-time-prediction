name: Test
on:
  push:
    branch:
      - main
  pull_request:
    branch:
      - main 
jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3  

      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run tests
        run: python -m pytest       